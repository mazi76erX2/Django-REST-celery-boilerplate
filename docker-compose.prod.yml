services:
  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile.prod
    entrypoint: /app/docker/backend/entrypoint.prod.sh
    command: >
      gunicorn server.asgi:application
      --bind 0.0.0.0:8000
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --threads 2
      --worker-connections 1000
      --max-requests 10000
      --max-requests-jitter 1000
      --timeout 30
      --keepalive 5
      --access-logfile -
      --error-logfile -
      --capture-output
      --enable-stdio-inheritance
    working_dir: /app/backend
    volumes:
      - static_volume:/app/backend/staticfiles
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - backend
    expose:
      - 8000
    env_file:
      - ./.env

  celery-worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile.prod
    command: celery -A server worker -l INFO --concurrency=4
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - backend
    env_file:
      - ./.env

  celery-beat:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile.prod
    command: celery -A server beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - backend
    env_file:
      - ./.env

  flower:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile.prod
    command: celery -A server flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    working_dir: /app/backend
    depends_on:
      - celery-worker
    networks:
      - backend
    expose:
      - 5555
    env_file:
      - ./.env

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    expose:
      - 5432
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  valkey:
    restart: unless-stopped
    image: valkey/valkey:9-alpine
    expose:
      - 6379
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./docker/nginx/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  nginx:
    build: ./docker/nginx
    volumes:
      - static_volume:/app/backend/staticfiles
      - ./docker/nginx/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/certbot/www:/var/www/certbot
    ports:
      - 80:80
      - 443:443
    depends_on:
      - backend
    networks:
      - backend
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

volumes:
  static_volume: {}
  db: {}
  valkey_data: {}

networks:
  backend:
    driver: bridge
